<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Cutting Celebration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap');

.cursive-text {
  font-family: 'Dancing Script', cursive;
}

.birthday-heading {
  font-family: 'Dancing Script', cursive;
  font-weight: 700;
  letter-spacing: 1px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

html,
body {
  width: 100%;
  height: 100%;
}

body {
  background: #140516;
  font-family: 'Dancing Script', cursive;
  margin: 0;
  overflow: hidden;
  position: relative;
}

#cake {
  filter: drop-shadow(0 26px 50px rgba(0, 0, 0, 0.34));
  display: block;
  position: relative;
  margin: -10em auto 0 auto;
  z-index: 5;
  transition: transform 0.8s ease, filter 0.8s ease;
}

#cake path[fill="#fefae9"],
#cake rect[fill="#fefae9"] {
  fill: #ffe7c2;
}

#cake path[fill="#a88679"] {
  fill: #b47a68;
}

#cake path[fill="#8b6a60"] {
  fill: #7c4f48;
}

.scene-container {
  align-items: center;
  background:
    radial-gradient(circle at 22% 16%, rgba(251, 113, 133, 0.34), transparent 30%),
    radial-gradient(circle at 78% 18%, rgba(20, 184, 166, 0.22), transparent 28%),
    radial-gradient(circle at 50% 78%, rgba(251, 191, 36, 0.18), transparent 34%),
    linear-gradient(145deg, #140516 0%, #35122c 46%, #102a36 100%);
  display: flex;
  flex-direction: column;
  height: 100vh;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.scene-container::before,
.scene-container::after {
  content: "";
  pointer-events: none;
  position: absolute;
  z-index: 0;
}

.scene-container::before {
  background:
    radial-gradient(circle at 18% 30%, rgba(255, 255, 255, 0.55) 0 1px, transparent 2px),
    radial-gradient(circle at 42% 12%, rgba(255, 231, 194, 0.7) 0 1px, transparent 2px),
    radial-gradient(circle at 76% 34%, rgba(255, 255, 255, 0.5) 0 1px, transparent 2px),
    radial-gradient(circle at 88% 76%, rgba(251, 191, 36, 0.55) 0 1px, transparent 2px);
  background-size: 120px 120px;
  filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.45));
  height: 100%;
  inset: 0 0 auto;
  opacity: 0.55;
}

.scene-container::after {
  background:
    radial-gradient(circle, rgba(244, 114, 182, 0.24), rgba(244, 114, 182, 0) 67%),
    radial-gradient(circle at 80% 20%, rgba(34, 211, 238, 0.24), rgba(34, 211, 238, 0) 58%);
  filter: blur(18px);
  height: 34rem;
  inset: auto -9rem -13rem -9rem;
}

.scene-container.celebrating #cake {
  filter: drop-shadow(0 0 34px rgba(255, 231, 194, 0.82));
  transform: translateX(-18px) rotate(-1deg);
}

.scene-container.cake-cut #cake {
  transform: translateX(-24px) rotate(-1deg) scale(0.98);
}

/* ============================================== Candle
*/

.velas {
  background: #fff4d8;
  border-radius: 10px;
  position: absolute;
  top: calc(50% - 205px);
  left: 50%;
  margin-left: -2.4px;
  margin-top: -8.33333333px;
  width: 5px;
  height: 35px;
  transform: translateY(-300px);
  backface-visibility: hidden;
  animation: in 500ms 6s ease-out forwards;
  cursor: pointer;
  z-index: 18;
  transition: opacity 0.5s ease, transform 0.7s ease;
}

.velas.blown .fuego {
  animation: blowOut 0.45s ease forwards;
}
.velas:after,
.velas:before {
  background: rgba(255, 0, 0, 0.4);
  content: "";
  position: absolute;
  width: 100%;
  height: 2.22222222px;
}
.velas:after {
  top: 25%;
  left: 0;
}
.velas:before {
  top: 45%;
  left: 0;
}

/* ============================================== Fire
*/

.fuego {
  border-radius: 100%;
  position: absolute;
  top: -20px;
  left: 50%;
  margin-left: -2.6px;
  width: 6.66666667px;
  height: 18px;
}
.fuego:nth-child(1) {
  animation: fuego 2s 6.5s infinite;
}
.fuego:nth-child(2) {
  animation: fuego 1.5s 6.5s infinite;
}
.fuego:nth-child(3) {
  animation: fuego 1s 6.5s infinite;
}
.fuego:nth-child(4) {
  animation: fuego 0.5s 6.5s infinite;
}
.fuego:nth-child(5) {
  animation: fuego 0.2s 6.5s infinite;
}

/* ============================================== Animation Fire
*/

@keyframes fuego {
  0%, 100% {
    background: rgba(254, 248, 97, 0.5);
    box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
    transform: translateY(0) scale(1);
  }
  50% {
    background: rgba(255, 50, 0, 0.1);
    box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2);
    transform: translateY(-20px) scale(0);
  }
}

@keyframes in {
  to {
    transform: translateY(0);
  }
}

@keyframes blowOut {
  to {
    opacity: 0;
    transform: translateY(-18px) scale(0);
  }
}

.instruction {
  background: rgba(255, 247, 237, 0.86);
  border: 1px solid rgba(255, 231, 194, 0.78);
  border-radius: 999px;
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22), 0 0 30px rgba(251, 191, 36, 0.13);
  color: #e11d48;
  font-family: 'Dancing Script', cursive;
  font-size: 0.78rem;
  font-style: italic;
  font-weight: 700;
  left: 50%;
  letter-spacing: 0.2em;
  line-height: 1.65;
  min-width: min(86vw, 310px);
  padding: 0.75rem 1rem;
  position: absolute;
  text-align: center;
  text-shadow: none;
  text-transform: uppercase;
  top: 8%;
  transform: translateX(-50%);
  transition: opacity 0.5s ease;
  z-index: 12;
}

.happy-birthday-text {
  color: #ffe7c2;
  font-family: 'Dancing Script', cursive;
  left: 50%;
  opacity: 0;
  position: absolute;
  text-align: center;
  text-shadow: 0 0 20px rgba(251, 191, 36, 0.42), 2px 2px 4px rgba(0, 0, 0, 0.28);
  top: 12%;
  transform: translate(-50%, 24px) scale(0.92);
  transition: opacity 0.8s ease, transform 0.8s ease;
  z-index: 12;
}

.happy-birthday-text.visible {
  opacity: 1;
  transform: translate(-50%, 0) scale(1);
}

.happy-birthday-text span {
  display: block;
}

.happy-birthday-text .happy-text {
  font-size: clamp(2.2rem, 7vw, 5rem);
}

.happy-birthday-text .birthday-text {
  color: #fb7185;
  font-size: clamp(2.6rem, 9vw, 6.5rem);
  font-weight: 700;
}

.knife {
  height: 16px;
  left: -180px;
  opacity: 0;
  position: absolute;
  top: 54%;
  transform: translateY(-50%) rotate(-10deg);
  transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 180px;
  z-index: 14;
}

.knife.cutting {
  animation: knifeCut 1.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.knife-blade {
  background: linear-gradient(90deg, #f8fafc, #9ca3af);
  border-radius: 999px 8px 8px 999px;
  height: 14px;
  left: 48px;
  position: absolute;
  top: 1px;
  width: 128px;
}

.knife-handle {
  background: linear-gradient(90deg, #4b2e2a, #8b5e54);
  border-radius: 10px;
  height: 20px;
  left: 0;
  position: absolute;
  top: -2px;
  width: 58px;
}

.cake-slice {
  background:
    linear-gradient(135deg, transparent 0 49%, rgba(255, 255, 255, 0.75) 50% 52%, transparent 53%),
    linear-gradient(145deg, #b47a68 0 42%, #ffe7c2 43% 57%, #7c4f48 58% 100%);
  border-radius: 10px 80% 14px 12px;
  box-shadow: 0 18px 35px rgba(139, 106, 96, 0.32);
  height: 88px;
  left: calc(50% + 40px);
  opacity: 0;
  position: absolute;
  top: 58%;
  transform: translate(-50%, -50%) rotate(0deg);
  transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  width: 110px;
  z-index: 13;
}

.cake-slice.visible {
  opacity: 1;
  transform: translate(105px, -48px) rotate(24deg);
}

.cake-cut-mark {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(96, 48, 42, 0.65), rgba(255, 255, 255, 0));
  border-radius: 999px;
  height: 146px;
  left: calc(50% + 16px);
  opacity: 0;
  position: absolute;
  top: 48%;
  transform: translate(-50%, -50%) rotate(18deg) scaleY(0);
  transform-origin: top;
  transition: opacity 0.35s ease, transform 0.6s ease;
  width: 5px;
  z-index: 12;
}

.cake-cut-mark.visible {
  opacity: 1;
  transform: translate(-50%, -50%) rotate(18deg) scaleY(1);
}

.cake-crumb {
  background: #ffe7c2;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(139, 106, 96, 0.28);
  height: 8px;
  position: fixed;
  transform: translate3d(0, 0, 0);
  width: 8px;
  z-index: 21;
  will-change: transform, opacity;
  animation: crumbDrift var(--duration, 900ms) ease-out forwards;
}

.party-bomb {
  background: radial-gradient(circle at 35% 30%, #ffffff 0 8%, #fb7185 9% 55%, #14b8a6 56%);
  border-radius: 50%;
  bottom: 12%;
  box-shadow: 0 0 28px rgba(251, 113, 133, 0.38);
  height: 56px;
  opacity: 0;
  position: absolute;
  transform: scale(0.4);
  transition: all 0.5s ease;
  width: 56px;
  z-index: 10;
}

.party-bomb-left { left: 12%; }
.party-bomb-right { right: 12%; }

.firework-container,
.confetti-layer,
.balloon-layer {
  inset: 0;
  pointer-events: none;
  position: fixed;
  z-index: 9;
}

.firework {
  bottom: 8%;
  height: 8px;
  position: absolute;
  width: 8px;
}

.firework::before {
  background: #f59e0b;
  border-radius: 50%;
  box-shadow: 0 0 16px #f59e0b;
  content: "";
  height: 8px;
  left: 0;
  position: absolute;
  top: 0;
  width: 8px;
}

.firework-particle {
  animation: explode 0.95s ease-out forwards;
  border-radius: 50%;
  height: 7px;
  opacity: 1;
  position: absolute;
  width: 7px;
}

.confetti-piece {
  height: 10px;
  position: fixed;
  transform: translate3d(0, 0, 0);
  width: 10px;
  z-index: 20;
  will-change: transform, opacity;
  animation: confettiBurst var(--duration, 1300ms) ease-out forwards;
}

.confetti-piece.streamer {
  border-radius: 999px !important;
  height: 16px;
  width: 6px;
}

.celebration-balloon {
  bottom: -90px;
  height: 70px;
  position: fixed;
  width: 58px;
  z-index: 7;
}

.celebration-balloon::after {
  background: rgba(255, 255, 255, 0.65);
  content: "";
  height: 75px;
  left: 50%;
  position: absolute;
  top: 56px;
  width: 2px;
}

.celebration-balloon.pink { color: #fb7185; }
.celebration-balloon.purple { color: #d946ef; }
.celebration-balloon.cyan { color: #14b8a6; }
.celebration-balloon.gold { color: #f59e0b; }

.wish-popup {
  background: rgba(255, 247, 237, 0.92);
  border: 1px solid rgba(255, 231, 194, 0.8);
  border-radius: 28px;
  box-shadow: 0 24px 70px rgba(251, 113, 133, 0.28);
  color: #475569;
  display: none;
  left: 50%;
  max-width: min(90vw, 440px);
  padding: 2rem;
  position: fixed;
  text-align: center;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  z-index: 30;
}

.wish-popup.visible {
  animation: popupIn 0.45s ease forwards;
  display: block;
}

.wish-popup h2 {
  color: #be123c;
  font-family: 'Dancing Script', cursive;
  font-size: 3rem;
  font-style: normal;
  margin: 0 0 0.75rem;
  text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.12);
}

.wish-popup p {
  line-height: 1.6;
  margin: 0 0 1.3rem;
}

.wish-popup button {
  background: #020617;
  border: 0;
  border-radius: 999px;
  box-shadow: 0 16px 35px rgba(251, 113, 133, 0.22);
  color: #ffffff;
  cursor: pointer;
  font-family: 'Dancing Script', cursive;
  font-size: 0.78rem;
  font-style: normal;
  font-weight: 700;
  letter-spacing: 0.14em;
  padding: 0.9rem 1.45rem;
  text-transform: uppercase;
}

.cake-cut-action {
  background: #020617;
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 999px;
  bottom: 8%;
  box-shadow: 0 18px 45px rgba(251, 113, 133, 0.3);
  color: #ffffff;
  cursor: pointer;
  font-family: 'Dancing Script', cursive;
  font-size: 0.78rem;
  font-style: normal;
  font-weight: 700;
  left: 50%;
  letter-spacing: 0.18em;
  min-height: 3.5rem;
  padding: 0.95rem 1.55rem;
  position: absolute;
  text-transform: uppercase;
  transform: translateX(-50%);
  transition: opacity 0.35s ease, transform 0.35s ease, background 0.35s ease;
  z-index: 16;
}

.cake-cut-action:hover,
.cake-cut-action:focus-visible {
  background: #111827;
  outline: none;
  transform: translateX(-50%) translateY(-3px);
}

.scene-container.celebrating .cake-cut-action {
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(12px);
}

@keyframes shootUp {
  to { bottom: 72%; }
}

@keyframes explode {
  to {
    opacity: 0;
    transform: var(--travel-distance) scale(0.15);
  }
}

@keyframes floatUpBalloon {
  to {
    bottom: 112vh;
    opacity: 0;
    transform: translateX(var(--drift)) rotate(16deg);
  }
}

@keyframes popupIn {
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}

@keyframes confettiBurst {
  0% {
    opacity: 0;
    transform: translate3d(0, 0, 0) rotate(0deg);
  }
  12% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate3d(var(--tx), var(--ty), 0) rotate(var(--rot));
  }
}

@keyframes crumbDrift {
  0% {
    opacity: 1;
    transform: translate3d(0, 0, 0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate3d(var(--tx), var(--ty), 0) scale(0.55);
  }
}

@keyframes knifeCut {
  0% {
    left: calc(50% - 155px);
    transform: translateY(-50%) rotate(-10deg);
  }
  35% {
    left: calc(50% - 10px);
    transform: translateY(-70%) rotate(-43deg);
  }
  68% {
    left: calc(50% + 20px);
    transform: translateY(-24%) rotate(-50deg);
  }
  100% {
    left: calc(50% + 68px);
    transform: translateY(-45%) rotate(-18deg);
  }
}

.text {
  color: #ffe7c2;
  font-family: 'Dancing Script', cursive;
  font-weight: 700;
  font-style: normal;
  position: relative;
  text-align: center;
  z-index: 6;
}

.text h1 {
  color: #ffe7c2;
  font-size: 1.8em;
  margin: 0;
  text-shadow: 0 0 18px rgba(251, 191, 36, 0.5), 1px 1px 3px rgba(0, 0, 0, 0.32);
}

.text p {
  color: #fecdd3;
  font-family: 'Dancing Script', cursive;
  font-size: 0.82rem;
  font-style: italic;
  margin: 0.35rem 0 0;
}

.cake-stage-glow {
  background: radial-gradient(ellipse, rgba(255, 231, 194, 0.22), transparent 65%);
  border-radius: 50%;
  height: 14rem;
  left: 50%;
  position: absolute;
  top: 62%;
  transform: translate(-50%, -50%);
  width: min(72vw, 34rem);
  z-index: 1;
}

.corner-decoration {
  color: #ffe7c2;
  font-size: clamp(3rem, 8vw, 6rem);
  opacity: 0.55;
  pointer-events: none;
  position: absolute;
  text-shadow: 0 0 24px rgba(251, 191, 36, 0.42);
  z-index: 2;
}

.corner-decoration.left {
  left: 7%;
  top: 18%;
  transform: rotate(-16deg);
}

.corner-decoration.right {
  bottom: 15%;
  right: 8%;
  transform: rotate(14deg);
}

.music-badge {
  align-items: center;
  background: rgba(255, 247, 237, 0.86);
  border: 1px solid rgba(255, 231, 194, 0.78);
  border-radius: 999px;
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
  color: #be123c;
  display: flex;
  gap: 0.6rem;
  left: 50%;
  padding: 0.7rem 1rem;
  position: absolute;
  top: 2.2%;
  transform: translateX(-50%);
  z-index: 16;
}

.music-badge button {
  background: #020617;
  border: 0;
  border-radius: 50%;
  color: white;
  cursor: pointer;
  font-family: 'Dancing Script', cursive;
  font-size: 0.8rem;
  height: 2rem;
  width: 2rem;
}

.music-badge span {
  font-size: 1.05rem;
  font-weight: 700;
  white-space: nowrap;
}
    </style>
</head>
<body>
  <div class="scene-container" id="scene">
    <audio id="birthdaySong" loop preload="auto">
      <source src="/happy-birthday-334876.mp3" type="audio/mpeg">
    </audio>
    <div class="music-badge" id="musicBadge">
      <button type="button" id="musicToggle" aria-label="Play or pause birthday song">▶</button>
      <span id="musicStatus">Birthday song</span>
    </div>
    <div class="cake-stage-glow" aria-hidden="true"></div>
    <div class="corner-decoration left" aria-hidden="true">✦</div>
    <div class="corner-decoration right" aria-hidden="true">♥</div>
    <div class="firework-container" id="fireworkContainer"></div>
    <div class="confetti-layer" id="confettiLayer"></div>
    <div class="balloon-layer" id="balloonLayer"></div>
    <div class="instruction" id="instruction">Blow out the candle<br>or cut the cake</div>
    <div class="happy-birthday-text" id="happyBirthdayText">
      <span class="happy-text">Happy</span>
      <span class="birthday-text">Birthday</span>
    </div>
    <div class="knife" id="knife">
      <div class="knife-handle"></div>
      <div class="knife-blade"></div>
    </div>
    <div class="cake-cut-mark" id="cakeCutMark"></div>
    <div class="cake-slice" id="cakeSlice"></div>
    <div class="party-bomb party-bomb-left" id="bombLeft"></div>
    <div class="party-bomb party-bomb-right" id="bombRight"></div>
    <div class="velas">
    <div class="fuego"></div>
    <div class="fuego"></div>
    <div class="fuego"></div>
    <div class="fuego"></div>
    <div class="fuego"></div>
</div>

<div class="text">
  <h1>happy birthday!</h1>
  <p>@bhurtel</p>
</div>
    <button class="cake-cut-action" id="cutCakeButton" type="button">Cut The Cake</button>
  </div>
  <div class="wish-popup" id="wishPopup">
    <h2>Make a wish</h2>
    <p>Close your eyes, keep the sweetest thought in your heart, and let this moment be yours.</p>
    <button type="button" id="wishDone">Write Wish</button>
  </div>
  <script>
    const scene = document.getElementById('scene');
    const candle = document.querySelector('.velas');
    const flames = document.querySelectorAll('.fuego');
    const instruction = document.getElementById('instruction');
    const knife = document.getElementById('knife');
    const cutCakeButton = document.getElementById('cutCakeButton');
    const cakeCutMark = document.getElementById('cakeCutMark');
    const cakeSlice = document.getElementById('cakeSlice');
    const happyBirthdayText = document.getElementById('happyBirthdayText');
    const fireworkContainer = document.getElementById('fireworkContainer');
    const confettiLayer = document.getElementById('confettiLayer');
    const balloonLayer = document.getElementById('balloonLayer');
    const wishPopup = document.getElementById('wishPopup');
    const wishDone = document.getElementById('wishDone');
    const birthdaySong = document.getElementById('birthdaySong');
    const musicToggle = document.getElementById('musicToggle');
    const musicStatus = document.getElementById('musicStatus');
    let isAnimating = false;
    let musicStarted = false;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    const confettiLimit = isMobile ? 110 : 240;

    birthdaySong.volume = 0.58;

    function setMusicUi(playing) {
      musicToggle.textContent = playing ? '❚❚' : '▶';
      musicStatus.textContent = playing ? 'Birthday song playing' : 'Tap for birthday song';
    }

    function playBirthdaySong() {
      if (musicStarted && !birthdaySong.paused) return;
      birthdaySong.play()
        .then(() => {
          musicStarted = true;
          setMusicUi(true);
        })
        .catch(() => {
          setMusicUi(false);
        });
    }

    function pauseBirthdaySong() {
      birthdaySong.pause();
      setMusicUi(false);
    }

    playBirthdaySong();
    window.addEventListener('pointerdown', playBirthdaySong, { once: true });
    window.addEventListener('keydown', playBirthdaySong, { once: true });
    birthdaySong.addEventListener('play', () => setMusicUi(true));
    birthdaySong.addEventListener('pause', () => setMusicUi(false));
    birthdaySong.addEventListener('error', () => {
      musicStatus.textContent = 'Song file not found';
      musicToggle.textContent = '▶';
    });
    musicToggle.addEventListener('pointerdown', (event) => {
      event.stopPropagation();
    });
    musicToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      if (birthdaySong.paused) {
        playBirthdaySong();
      } else {
        pauseBirthdaySong();
      }
    });

    function removeOldestPieces(layer, selector, limit) {
      const pieces = layer.querySelectorAll(selector);
      const overflow = pieces.length - limit;
      if (overflow > 0) {
        pieces.forEach((piece, index) => {
          if (index < overflow) piece.remove();
        });
      }
    }

    function createConfetti(x, y, amount = 50) {
      if (prefersReducedMotion) return;
      const colors = ['#fb7185', '#f59e0b', '#a855f7', '#14b8a6', '#f43f5e', '#fbbf24', '#22d3ee'];
      const count = Math.min(amount, isMobile ? 20 : 46);
      removeOldestPieces(confettiLayer, '.confetti-piece', confettiLimit);
      for (let i = 0; i < count; i++) {
        const confetti = document.createElement('div');
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const distance = (isMobile ? 72 : 105) + Math.random() * (isMobile ? 76 : 130);
        const fall = (isMobile ? 95 : 130) + Math.random() * (isMobile ? 90 : 150);
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance + fall;

        confetti.className = 'confetti-piece';
        if (Math.random() > 0.55) confetti.classList.add('streamer');
        confetti.style.left = `${x}px`;
        confetti.style.top = `${y}px`;
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        confetti.style.setProperty('--tx', `${tx}px`);
        confetti.style.setProperty('--ty', `${ty}px`);
        confetti.style.setProperty('--rot', `${Math.random() * 720 - 360}deg`);
        confetti.style.setProperty('--duration', `${900 + Math.random() * (isMobile ? 650 : 950)}ms`);
        confettiLayer.appendChild(confetti);
        setTimeout(() => confetti.remove(), 2200);
      }
    }

    function createCakeCrumbs(x, y) {
      if (prefersReducedMotion) return;
      const count = isMobile ? 8 : 18;
      removeOldestPieces(confettiLayer, '.cake-crumb', isMobile ? 28 : 60);
      for (let i = 0; i < count; i++) {
        const crumb = document.createElement('div');
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
        const distance = 35 + Math.random() * (isMobile ? 45 : 85);
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance + 80 + Math.random() * 70;

        crumb.className = 'cake-crumb';
        crumb.style.left = `${x + (Math.random() - 0.5) * 34}px`;
        crumb.style.top = `${y + (Math.random() - 0.5) * 30}px`;
        crumb.style.background = Math.random() > 0.45 ? '#fefae9' : '#a88679';
        crumb.style.setProperty('--tx', `${tx}px`);
        crumb.style.setProperty('--ty', `${ty}px`);
        crumb.style.setProperty('--duration', `${700 + Math.random() * 500}ms`);
        confettiLayer.appendChild(crumb);
        setTimeout(() => crumb.remove(), 1400);
      }
    }

    function createConfettiCurtain() {
      if (prefersReducedMotion) return;
      const bursts = isMobile ? 3 : 6;
      for (let i = 0; i < bursts; i++) {
        setTimeout(() => {
          createConfetti(Math.random() * window.innerWidth, -18, isMobile ? 14 : 30);
        }, i * (isMobile ? 220 : 170));
      }
    }

    function createFirework(side, offset = 0) {
      if (prefersReducedMotion) return;
      const firework = document.createElement('div');
      const base = side === 'left' ? '25%' : '75%';
      const colors = ['#fb7185', '#f59e0b', '#a855f7', '#14b8a6', '#f43f5e', '#fbbf24', '#22d3ee'];

      firework.className = 'firework';
      firework.style.left = `calc(${base} + ${offset + (Math.random() - 0.5) * 8}px)`;
      firework.style.animation = 'shootUp 1.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards';
      fireworkContainer.appendChild(firework);

      setTimeout(() => {
        const particleCount = isMobile ? 18 : 38;
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          const angle = (i / particleCount) * 360 + (Math.random() - 0.5) * 10;
          const distance = Math.random() * (isMobile ? 72 : 120) + (isMobile ? 42 : 60);
          const color = colors[Math.floor(Math.random() * colors.length)];
          particle.className = 'firework-particle';
          particle.style.background = color;
          particle.style.boxShadow = `0 0 15px ${color}, 0 0 25px ${color}`;
          particle.style.left = '50%';
          particle.style.top = '50%';
          particle.style.setProperty('--travel-distance', `translate(${Math.cos(angle * Math.PI / 180) * distance}px, ${Math.sin(angle * Math.PI / 180) * distance}px)`);
          firework.appendChild(particle);
        }
      }, 760);

      setTimeout(() => firework.remove(), 2300);
    }

    function createRisingBalloon() {
      if (prefersReducedMotion) return;
      const colors = ['pink', 'purple', 'cyan', 'gold'];
      const balloon = document.createElement('div');
      balloon.className = `celebration-balloon ${colors[Math.floor(Math.random() * colors.length)]}`;
      balloon.style.left = `${Math.random() * 80 + 10}%`;
      balloon.style.setProperty('--drift', `${Math.random() * 160 - 80}px`);
      balloon.innerHTML = `
        <svg viewBox="0 0 50 60" xmlns="http://www.w3.org/2000/svg">
          <path d="M25 50 C38.8071 50 50 38.8071 50 25 C50 11.1929 38.8071 0 25 0 C11.1929 0 0 11.1929 0 25 C0 38.8071 11.1929 50 25 50 Z" fill="currentColor" />
        </svg>
      `;
      balloonLayer.appendChild(balloon);
      setTimeout(() => {
        balloon.style.animation = `floatUpBalloon ${Math.random() * 3 + 8}s linear forwards`;
      }, 50);
      setTimeout(() => balloon.remove(), 11200);
    }

    async function startCelebration() {
      if (isAnimating) return;
      playBirthdaySong();
      isAnimating = true;
      scene.classList.add('celebrating');
      candle.classList.add('blown');
      instruction.style.opacity = '0';

      await new Promise((resolve) => setTimeout(resolve, 500));
      knife.style.opacity = '1';
      knife.style.left = 'calc(50% - 155px)';

      await new Promise((resolve) => setTimeout(resolve, 850));
      knife.classList.add('cutting');
      cakeCutMark.classList.add('visible');
      scene.classList.add('cake-cut');
      createCakeCrumbs(window.innerWidth / 2 + 18, window.innerHeight * 0.52);
      createConfetti(window.innerWidth / 2, window.innerHeight * 0.45, isMobile ? 24 : 70);

      await new Promise((resolve) => setTimeout(resolve, 850));
      cakeSlice.classList.add('visible');
      createCakeCrumbs(window.innerWidth / 2 + 72, window.innerHeight * 0.58);
      createConfettiCurtain();

      const fireworkBursts = isMobile ? [
        { side: 'left', offset: 0 },
        { side: 'right', offset: 0 },
      ] : [
        { side: 'left', offset: -18 },
        { side: 'left', offset: 18 },
        { side: 'right', offset: -18 },
        { side: 'right', offset: 18 },
        { side: 'left', offset: 0 },
        { side: 'right', offset: 0 },
      ];

      fireworkBursts.forEach(({ side, offset }, index) => {
        setTimeout(() => createFirework(side, offset), index * 110);
      });

      setTimeout(() => happyBirthdayText.classList.add('visible'), 650);

      const balloonInterval = setInterval(createRisingBalloon, isMobile ? 850 : 360);
      setTimeout(() => clearInterval(balloonInterval), isMobile ? 3600 : 6500);

      setTimeout(() => {
        const left = document.getElementById('bombLeft');
        const right = document.getElementById('bombRight');
        [left, right].forEach((bomb) => {
          bomb.style.opacity = '1';
          bomb.style.transform = 'scale(1)';
        });

        setTimeout(() => {
          [left, right].forEach((bomb) => {
            const rect = bomb.getBoundingClientRect();
            createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, isMobile ? 20 : 58);
            bomb.style.transform = 'scale(3)';
            bomb.style.opacity = '0';
          });
        }, 500);
      }, 1500);

      const confettiInterval = setInterval(() => createConfetti(Math.random() * window.innerWidth, -20, isMobile ? 10 : 28), isMobile ? 520 : 320);
      setTimeout(() => {
        clearInterval(confettiInterval);
        wishPopup.classList.add('visible');
        isAnimating = false;
      }, isMobile ? 3600 : 5000);
    }

    candle.addEventListener('click', startCelebration);
    flames.forEach((flame) => flame.addEventListener('click', startCelebration));
    cutCakeButton.addEventListener('click', startCelebration);
    wishDone.addEventListener('click', () => {
      pauseBirthdaySong();
      window.location.href = '/wish';
    });
  </script>
</body>
</html>
